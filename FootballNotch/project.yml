name: FootballNotch
options:
  bundleIdPrefix: com.footballnotch
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  FootballNotch:
    type: application
    platform: macOS
    sources:
      - path: FootballNotch
    info:
      path: FootballNotch/Info.plist
      properties:
        LSUIElement: YES
        CFBundleDisplayName: FootballNotch
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.footballnotch.app
        PRODUCT_NAME: FootballNotch
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
  FootballNotchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FootballNotchTests
    dependencies:
      - target: FootballNotch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.footballnotch.tests
        CODE_SIGN_STYLE: Automatic
schemes:
  FootballNotch:
    build:
      targets:
        FootballNotch: all
        FootballNotchTests: [test]
    test:
      targets:
        - FootballNotchTests
